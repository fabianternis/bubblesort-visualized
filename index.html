<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubblesort visualisiert</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <h1>Bubblesort visualisiert</h1>

    <div class="actions">
        <form id="sortSettingsForm">
            <div class="input-stuff">
                <label for="list_lenght">Listenlänge: </label>
                <input type="number" name="list_lenght" id="listLenghInput" min="3" value="6">
            </div>
        </form>
        <button id="regenerateButton">Re-generate</button>
        <button id="sortTrigger">Perform Sort</button>
    </div>

    <div id="outputContainer">
        <div id="currentListOutput"></div>
    </div>

    <table id="outputTable"></table>
    <script src="app.js"></script>
</body>
</html>
